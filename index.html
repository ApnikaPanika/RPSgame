<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="heading">Legendary, one and only - Rock Paper Scissors</h1>

    <div class="gameContainer">
        <div>
            <img src="Penguin.jpg" alt="Profile picture" width="200">
            <div class="nameContainer">
                <p class="name">Penguin Tom </p>
                <p class="score">Score: <span class="points js-playerScore">0</span></p> 
            </div>
            
            <div class="buttonContainer">
                <button class="rock js-rock">Rock</button>
                <button class="paper js-paper">Paper</button>
                <button class="scissors js-scissors">Scissors</button>
            </div>
        </div>

        <div>
            <p class="gameRoundText js-gameRoundText">Lai sākas spēle! Veic savu gājienu! Kurš pirmais sasniegs 3 uzvaras?</p>
        </div>


        <div>
            <img src="JanPicture.jpg" alt="PC player" width="200">
            <div class="nameContainer">
                <p class="name">Jans Wick</p>
                <p class="score">Score: <span class="points js-botScore">0</span></p>
            </div>
            
        </div>
    </div>
    
</body>
</html>
